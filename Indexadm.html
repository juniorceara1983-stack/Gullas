<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gullas ADM - Gestão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #f59e0b; }
        body { font-family: sans-serif; background: #f1f5f9; text-align: center; padding: 15px; margin: 0; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn:active { opacity: 0.8; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; background: white; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f8fafc; color: #64748b; text-transform: uppercase; font-size: 0.7rem; }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/juniorceara1983-stack/Gullas/main/1774954149094.png" style="width:100px; margin-bottom:10px;">
    
    <div class="card">
        <h3>🚚 Registrar Envio</h3>
        <input type="text" id="p" placeholder="Nome do Produto (Ex: Coxinha)">
        <input type="number" id="q" placeholder="Quantidade Enviada">
        <button class="btn" id="btnEnv" onclick="enviar()">ENVIAR PARA LOJA</button>
    </div>

    <div class="card">
        <h3>📊 Balanço de Vendas</h3>
        <table id="tabelaVendas">
            <thead>
                <tr>
                    <th style="text-align:left">Item</th>
                    <th>Env</th>
                    <th>Sob</th>
                    <th>Ven</th>
                </tr>
            </thead>
            <tbody id="corpo"></tbody>
        </table>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn" style="background:#10b981" onclick="gerarPDF()">📄 BAIXAR PDF</button>
            <button class="btn" style="background:#ef4444" onclick="fecharCaixa()">🔒 FECHAR CX</button>
        </div>
        <button class="btn" style="background:#64748b; margin-top:10px;" onclick="carregar()">🔄 ATUALIZAR</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwymkSXlXjQj27nWokMK9nNSystwUnDXCUqV_b2QcfDRCswl_DhTDJ06ozslFf_FA1h/exec";
        
        // Itens que sempre devem aparecer na lista
        const itensFixos = ["Massa Quente", "Massa Fria", "Massa Forno", "Bolos (inteiros)", "Suco Galao", "Empadas", "Tortas", "Pastel"];

        async function enviar() {
            const prod = document.getElementById('p').value;
            const qtd = document.getElementById('q').value;
            if(!prod || !qtd) return alert("Preencha o produto e a quantidade!");
            
            const btn = document.getElementById('btnEnv');
            btn.innerText = "ENVIANDO..."; btn.disabled = true;

            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ action: "envio", produto: prod, qtd: parseInt(qtd) })
            });
            
            alert("Enviado!");
            document.getElementById('p').value = "";
            document.getElementById('q').value = "";
            btn.innerText = "ENVIAR PARA LOJA"; btn.disabled = false;
            carregar();
        }

        async function carregar() {
            const corpo = document.getElementById('corpo');
            corpo.innerHTML = "<tr><td colspan='4'>Carregando...</td></tr>";
            
            try {
                const res = await fetch(SCRIPT_URL);
                const rows = await res.json();
                const resumo = {};

                // Inicia os fixos com zero
                itensFixos.forEach(f => resumo[f] = {e:0, s:0});

                // Processa o que vem da planilha (após o último fechamento)
                rows.slice(1).forEach(r => {
                    const tipo = r[1], prod = r[2], qtd = parseInt(r[3]) || 0;
                    if(!resumo[prod]) resumo[prod] = {e:0, s:0}; 
                    if(tipo === "ENVIO") resumo[prod].e += qtd;
                    if(tipo === "SOBRA") resumo[prod].s += qtd;
                });

                corpo.innerHTML = "";
                for(let p in resumo) {
                    const v = resumo[p].e - resumo[p].s;
                    // Mostra se for fixo OU se teve movimento
                    if(itensFixos.includes(p) || resumo[p].e > 0 || resumo[p].s > 0) {
                        corpo.innerHTML += `
                            <tr>
                                <td style="text-align:left">${p}</td>
                                <td>${resumo[p].e}</td>
                                <td>${resumo[p].s}</td>
                                <td style="font-weight:bold;color:${v > 0 ? 'green' : '#334155'}">${v > 0 ? v : 0}</td>
                            </tr>`;
                    }
                }
            } catch(e) { corpo.innerHTML = "<tr><td colspan='4'>Erro ao carregar.</td></tr>"; }
        }

        async function fecharCaixa() {
            if(!confirm("Deseja fechar o caixa agora? Isso vai zerar o painel para o próximo turno.")) return;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "fechar" })});
            alert("Caixa Fechado! O painel agora está limpo.");
            location.reload();
        }

        function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const dataRel = new Date().toLocaleDateString('pt-BR');
            
            doc.text("Gullas - Relatório de Vendas - " + dataRel, 14, 15);
            doc.autoTable({ 
                html: '#tabelaVendas', 
                startY: 25,
                theme: 'grid',
                headStyles: { fillColor: [245, 158, 11] }
            });
            doc.save("Vendas_Gullas_" + dataRel + ".pdf");
        }

        carregar();
    </script>
</body>
</html>
