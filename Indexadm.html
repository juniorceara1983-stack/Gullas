<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gullas ADM - Gestão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #f59e0b; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); text-align: center; padding: 15px; margin: 0; color: #334155; }
        .logo { width: 100px; margin-bottom: 10px; }
        .card { background: white; border-radius: 16px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h3 { margin: 0 0 15px 0; font-size: 1rem; text-transform: uppercase; color: #1e293b; }
        
        .prod-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .prod-name { font-weight: 500; font-size: 0.9rem; text-align: left; flex: 1; }
        .q-input { width: 60px; padding: 8px; border: 2px solid #e2e8f0; border-radius: 8px; text-align: center; font-weight: bold; }
        
        .btn-novo-item { background: #e2e8f0; color: #475569; border: none; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        
        .item-novo-container { display: none; background: #fffbeb; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .input-text { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        th { color: #64748b; font-weight: 600; }
        .text-left { text-align: left; }

        /* Estilo do Modal Bíblico */
        #modalBiblico { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 85%; max-width: 350px; padding: 30px; border-radius: 25px; text-align: center; animation: pop 0.3s ease; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-logo { width: 80px; margin-bottom: 15px; }
        .modal-text { font-style: italic; color: #444; line-height: 1.5; font-size: 1.1rem; margin-bottom: 20px; }
        .btn-modal { background: #333; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/juniorceara1983-stack/Gullas/main/1774954149094.png" class="logo">
    
    <div class="card">
        <h3>Controle de Produção</h3>
        <button class="btn-novo-item" onclick="toggleNovoItem()">+ NOVO ITEM</button>

        <div id="containerNovo" class="item-novo-container">
            <input type="text" id="nome_novo" class="input-text" placeholder="Nome do produto extra">
            <input type="number" id="q_novo" class="input-text" placeholder="Quantidade">
            <button class="btn-main" style="background:#475569; padding: 10px;" onclick="enviarNovo()">REGISTRAR EXTRA</button>
        </div>

        <div id="listaProducao"></div>
        <button class="btn-main" id="btnMassa" onclick="enviarMassa()">REGISTRAR PRODUÇÃO</button>
    </div>

    <div class="card">
        <h3>Balanço Geral</h3>
        <table id="tabelaVendas">
            <thead>
                <tr><th class="text-left">Item</th><th>Env</th><th>Sob</th><th>Ven</th></tr>
            </thead>
            <tbody id="corpoBalanço"></tbody>
        </table>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn-main" style="background:#10b981; font-size: 0.8rem;" onclick="gerarPDF()">📄 PDF</button>
            <button class="btn-main" style="background:#ef4444; font-size: 0.8rem;" onclick="fecharCaixa()">🔒 FECHAR CX</button>
        </div>
        <button class="btn-main" style="background:#64748b; margin-top:10px;" onclick="carregar()">🔄 ATUALIZAR</button>
    </div>

    <div id="modalBiblico">
        <div class="modal-content">
            <img src="https://raw.githubusercontent.com/juniorceara1983-stack/Gullas/main/1774954149094.png" class="modal-logo">
            <div id="textoBiblico" class="modal-text"></div>
            <button class="btn-modal" onclick="confirmarFechamento()">AMÉM</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwymkSXlXjQj27nWokMK9nNSystwUnDXCUqV_b2QcfDRCswl_DhTDJ06ozslFf_FA1h/exec";
        const itensFixos = ["Massa Quente", "Massa Fria", "Massa Forno", "Bolos (inteiros)", "Suco Galao", "Empadas", "Tortas", "Pastel"];
        
        const mensagens = [
            "O Senhor é o meu pastor, nada me faltará. (Salmo 23:1)",
            "Tudo posso naquele que me fortalece. (Filipenses 4:13)",
            "Deem graças ao Senhor, porque ele é bom. (Salmo 136:1)",
            "Seja forte e corajoso! (Josué 1:9)",
            "Consagre ao Senhor tudo o que você faz. (Provérbios 16:3)",
            "A alegria do Senhor é a vossa força. (Neemias 8:10)",
            "O Senhor te abençoe e te guarde. (Números 6:24)",
            "Não temas, porque eu sou contigo. (Isaías 41:10)",
            "Em tudo dai graças. (1 Tessalonicenses 5:18)",
            "A fé é a certeza daquilo que esperamos. (Hebreus 11:1)"
        ];

        function toggleNovoItem() {
            const c = document.getElementById('containerNovo');
            c.style.display = (c.style.display === 'block') ? 'none' : 'block';
        }

        function renderizarListaProducao() {
            const cont = document.getElementById('listaProducao');
            cont.innerHTML = "";
            itensFixos.forEach(item => {
                cont.innerHTML += `<div class="prod-row"><span class="prod-name">${item}</span><input type="number" class="q-massa" data-p="${item}" placeholder="0"></div>`;
            });
        }

        async function enviarMassa() {
            const inputs = Array.from(document.querySelectorAll('.q-massa')).filter(i => i.value !== "" && i.value > 0);
            if(inputs.length === 0) return alert("Preencha ao menos uma quantidade.");
            const btn = document.getElementById('btnMassa');
            btn.innerText = "ENVIANDO..."; btn.disabled = true;
            for(const input of inputs) {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "envio", produto: input.dataset.p, qtd: parseInt(input.value) })});
            }
            alert("Produção registrada!");
            inputs.forEach(i => i.value = ""); 
            btn.innerText = "REGISTRAR PRODUÇÃO"; btn.disabled = false;
            carregar();
        }

        async function enviarNovo() {
            const p = document.getElementById('nome_novo').value;
            const q = document.getElementById('q_novo').value;
            if(!p || !q) return alert("Preencha tudo!");
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "envio", produto: p, qtd: parseInt(q) })});
            alert("Item extra registrado!");
            document.getElementById('nome_novo').value = ""; document.getElementById('q_novo').value = "";
            toggleNovoItem();
            carregar();
        }

        async function carregar() {
            const corpo = document.getElementById('corpoBalanço');
            corpo.innerHTML = "<tr><td colspan='4'>Atualizando...</td></tr>";
            try {
                const res = await fetch(SCRIPT_URL);
                const rows = await res.json();
                const resumo = {};
                itensFixos.forEach(f => resumo[f] = {e:0, s:0});
                rows.slice(1).forEach(r => {
                    const tipo = r[1], prod = r[2], qtd = parseInt(r[3]) || 0;
                    if(!resumo[prod]) resumo[prod] = {e:0, s:0};
                    if(tipo === "ENVIO") resumo[prod].e += qtd;
                    if(tipo === "SOBRA") resumo[prod].s += qtd;
                });
                corpo.innerHTML = "";
                for(let p in resumo) {
                    const v = resumo[p].e - resumo[p].s;
                    if(itensFixos.includes(p) || resumo[p].e > 0 || resumo[p].s > 0) {
                        corpo.innerHTML += `<tr><td class="text-left">${p}</td><td>${resumo[p].e}</td><td>${resumo[p].s}</td><td style="font-weight:bold;color:${v>0?'green':'black'}">${v>0?v:0}</td></tr>`;
                    }
                }
            } catch(e) { console.error(e); }
        }

        async function fecharCaixa() {
            if(!confirm("Deseja encerrar o turno e zerar o balanço?")) return;
            
            // Chama o script para fechar
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "fechar" })});
            
            // Escolhe mensagem aleatória e mostra o modal
            const msgAleatoria = mensagens[Math.floor(Math.random() * mensagens.length)];
            document.getElementById('textoBiblico').innerText = msgAleatoria;
            document.getElementById('modalBiblico').style.display = 'flex';
        }

        function confirmarFechamento() {
            location.reload();
        }

        function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Gullas - Balanço do Dia - " + new Date().toLocaleDateString(), 14, 15);
            doc.autoTable({ html: '#tabelaVendas', startY: 25, theme: 'grid', headStyles: {fillColor: [245, 158, 11]} });
            doc.save("Gullas_Balanco.pdf");
        }

        renderizarListaProducao();
        carregar();
    </script>
</body>
</html>
