<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gullas - Administração</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #f59e0b; --bg: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; color: var(--text); margin: 0; padding: 10px; }
        #loginOverlay { position: fixed; inset:0; background: white; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { text-align: center; padding: 20px; width: 100%; max-width: 300px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { font-size: 0.9rem; color: var(--primary); text-transform: uppercase; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; margin-top: 0; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        select, input { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; flex: 1; font-size: 1rem; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th { text-align: left; color: #64748b; padding-bottom: 10px; border-bottom: 2px solid #f1f5f9; }
        td { padding: 12px 5px; border-top: 1px solid #f1f5f9; text-align: center; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <img src="1774954149094.png" style="width: 130px; margin-bottom: 15px;">
            <h2 style="margin-bottom: 20px;">ACESSO RESTRITO GULLAS</h2>
            <input type="password" id="pass" placeholder="Senha de Acesso" style="width:100%; margin-bottom:15px; box-sizing: border-box;">
            <button class="btn btn-primary" onclick="checkLogin()">ACESSAR PAINEL</button>
        </div>
    </div>

    <div id="mainAdm" style="display:none;">
        <div class="card">
            <h2>🚚 Enviar Remessa para Loja</h2>
            <div class="row">
                <select id="prodSelect"></select>
                <input type="number" id="qtdAdd" style="width:85px" placeholder="Qtd">
            </div>
            <button class="btn btn-primary" onclick="addEnvio()">REGISTRAR ENVIO</button>
        </div>

        <div class="card">
            <h2>📊 Balanço de Vendas (Hoje)</h2>
            <table>
                <thead>
                    <tr>
                        <th style="text-align:left">PRODUTO</th>
                        <th>ENV</th>
                        <th>SOB</th>
                        <th style="text-align:right">VEN</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
            <button class="btn" style="background:#1e293b; color:white; margin-top:15px;" onclick="carregarRelatorio()">🔄 ATUALIZAR TABELA</button>
        </div>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzip6qASNtkcRNBWMINpQWVoxU71AL0Ajws_BmzobGdEBA23fa0-WvqX3GjIZf_me_1/exec";
    const cardapio = ["Massa Quente", "Massa Fria", "Massa Forno", "Bolos (inteiros)", "Suco Galao", "Empadas", "Tortas", "Pastel"];

    function checkLogin() {
        // Senha padrão 123 - você pode alterar aqui
        if(document.getElementById('pass').value === "123") {
            document.getElementById('loginOverlay').style.display = "none";
            document.getElementById('mainAdm').style.display = "block";
            init();
        } else {
            alert("Senha Incorreta!");
        }
    }

    function init() {
        const sel = document.getElementById('prodSelect');
        sel.innerHTML = "";
        cardapio.forEach(p => {
            sel.innerHTML += `<option value="${p}">${p}</option>`;
        });
        carregarRelatorio();
    }

    async function addEnvio() {
        const p = document.getElementById('prodSelect').value;
        const q = parseInt(document.getElementById('qtdAdd').value);
        if(!q) return alert("Informe a quantidade!");

        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: "envio", produto: p, qtd: q })
        });

        alert("Envio de " + p + " registrado com sucesso!");
        document.getElementById('qtdAdd').value = "";
        carregarRelatorio();
    }

    async function carregarRelatorio() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "<tr><td colspan='4'>Buscando dados...</td></tr>";

        try {
            const response = await fetch(SCRIPT_URL);
            const rows = await response.json();
            
            const consolidado = {};
            cardapio.forEach(p => consolidado[p] = { envio: 0, sobra: 0 });

            if (rows.length > 1) {
                rows.slice(1).forEach(row => {
                    const tipo = row[1]; // Coluna B
                    const prod = row[2]; // Coluna C
                    const qtd = parseInt(row[3]) || 0; // Coluna D

                    if (consolidado[prod]) {
                        if (tipo === "ENVIO") consolidado[prod].envio += qtd;
                        if (tipo === "SOBRA") consolidado[prod].sobra += qtd;
                    }
                });
            }

            tbody.innerHTML = "";
            cardapio.forEach(p => {
                const enviado = consolidado[p].envio;
                const sobra = consolidado[p].sobra;
                const vendido = enviado - sobra;

                if(enviado > 0 || sobra > 0) {
                    tbody.innerHTML += `
                        <tr>
                            <td style="text-align:left;">${p}</td>
                            <td>${enviado}</td>
                            <td>${sobra}</td>
                            <td style="font-weight:bold; color:#16a34a; text-align:right;">${vendido >= 0 ? vendido : 0}</td>
                        </tr>
                    `;
                }
            });
            
            if(tbody.innerHTML === "") {
                tbody.innerHTML = "<tr><td colspan='4'>Nenhuma movimentação hoje.</td></tr>";
            }

        } catch (e) {
            tbody.innerHTML = "<tr><td colspan='4'>Erro ao conectar com a planilha.</td></tr>";
        }
    }
</script>
</body>
</html>
