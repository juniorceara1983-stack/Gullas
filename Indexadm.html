<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gullas ADM - Oficial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #f59e0b; }
        body { font-family: sans-serif; background: #f1f5f9; text-align: center; padding: 15px; margin: 0; }
        .logo { width: 120px; margin-bottom: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; color: #333; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn:active { opacity: 0.8; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; background: white; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f8fafc; color: #64748b; }
        .text-left { text-align: left; }
        .q-envio { width: 60px; text-align: center; border: 1px solid #ddd; border-radius: 4px; padding: 5px; }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/juniorceara1983-stack/Gullas/main/1774954149094.png" class="logo">
    
    <div class="card">
        <h3>🚚 Registrar Envio (Lista Pré-definida)</h3>
        <table id="tabelaEnvio">
            <thead>
                <tr>
                    <th class="text-left">Item</th>
                    <th>Quantidade</th>
                </tr>
            </thead>
            <tbody id="corpoEnvio">
                </tbody>
        </table>
        <button class="btn" id="btnEnv" onclick="enviarVarios()">REGISTRAR ENVIOS</button>
    </div>

    <div class="card">
        <h3>➕ Adicionar Item Novo</h3>
        <input type="text" id="p_novo" placeholder="Nome do Produto Novo">
        <input type="number" id="q_novo" placeholder="Quantidade" style="margin-top: 10px;">
        <button class="btn" style="background: #64748b;" onclick="enviarNovo()">ADICIONAR E ENVIAR</button>
    </div>

    <div class="card">
        <h3>📊 Balanço Atual</h3>
        <table id="tabelaVendas">
            <thead>
                <tr>
                    <th class="text-left">Item</th>
                    <th>Env</th>
                    <th>Sob</th>
                    <th>Ven</th>
                </tr>
            </thead>
            <tbody id="corpoBalanço"></tbody>
        </table>
        
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn" style="background:#10b981" onclick="gerarPDF()">📄 PDF</button>
            <button class="btn" style="background:#ef4444" onclick="fecharCaixa()">🔒 FECHAR CX</button>
        </div>
        <button class="btn" style="background:#64748b; margin-top:10px;" onclick="carregar()">🔄 ATUALIZAR</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwymkSXlXjQj27nWokMK9nNSystwUnDXCUqV_b2QcfDRCswl_DhTDJ06ozslFf_FA1h/exec";
        const itensFixos = ["Massa Quente", "Massa Fria", "Massa Forno", "Bolos (inteiros)", "Suco Galao", "Empadas", "Tortas", "Pastel"];

        // Gera a tabela de envio com os itens fixos
        function gerarTabelaEnvio() {
            const corpo = document.getElementById('corpoEnvio');
            itensFixos.forEach(item => {
                corpo.innerHTML += `
                    <tr>
                        <td class="text-left">${item}</td>
                        <td><input type="number" class="q-envio" data-p="${item}" placeholder="0"></td>
                    </tr>`;
            });
        }

        async function enviarVarios() {
            const inputs = Array.from(document.querySelectorAll('.q-envio')).filter(i => i.value !== "" && i.value > 0);
            if(inputs.length === 0) return alert("Preencha a quantidade de pelo menos um item.");
            
            const btn = document.getElementById('btnEnv');
            btn.innerText = "ENVIANDO..."; btn.disabled = true;

            // Envia cada item preenchido
            for(const input of inputs) {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ action: "envio", produto: input.dataset.p, qtd: parseInt(input.value) })
                });
            }
            
            alert("Envios registrados!");
            inputs.forEach(i => i.value = ""); // Limpa os campos
            btn.innerText = "REGISTRAR ENVIOS"; btn.disabled = false;
            carregar();
        }

        async function enviarNovo() {
            const p = document.getElementById('p_novo').value;
            const q = document.getElementById('q_novo').value;
            if(!p || !q) return alert("Preencha produto e quantidade!");
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "envio", produto: p, qtd: parseInt(q) })});
            alert("Item novo enviado!");
            document.getElementById('p_novo').value = ""; document.getElementById('q_novo').value = "";
            carregar();
        }

        async function carregar() {
            const corpo = document.getElementById('corpoBalanço');
            corpo.innerHTML = "<tr><td colspan='4'>Buscando...</td></tr>";
            try {
                const res = await fetch(SCRIPT_URL);
                const rows = await res.json();
                const resumo = {};
                itensFixos.forEach(f => resumo[f] = {e:0, s:0});

                rows.slice(1).forEach(r => {
                    const tipo = r[1], prod = r[2], qtd = parseInt(r[3]) || 0;
                    if(!resumo[prod]) resumo[prod] = {e:0, s:0};
                    if(tipo === "ENVIO") resumo[prod].e += qtd;
                    if(tipo === "SOBRA") resumo[prod].s += qtd;
                });

                corpo.innerHTML = "";
                for(let p in resumo) {
                    const v = resumo[p].e - resumo[p].s;
                    if(itensFixos.includes(p) || resumo[p].e > 0 || resumo[p].s > 0) {
                        corpo.innerHTML += `<tr><td class="text-left">${p}</td><td>${resumo[p].e}</td><td>${resumo[p].s}</td><td style="font-weight:bold;color:${v>0?'green':'black'}">${v>0?v
