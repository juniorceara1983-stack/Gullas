<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gullas - Loja</title>
    <style>
        :root { --primary: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 400px; margin: auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        .logo-img { width: 140px; margin-bottom: 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .sobra-input { width: 80px; text-align: center; font-weight: bold; }
        .btn { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1rem; }
        #loading { color: #64748b; font-style: italic; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://github.com/joscelis/gullas/blob/main/1774954149094.png?raw=true" class="logo-img">
        <h2 style="color:var(--primary); margin:0;">CONFERÊNCIA</h2>
        
        <div id="loading">Carregando produtos...</div>

        <div id="formContent" style="display:none;">
            <select id="turnoSelect"><option value="Manhã">Turno: Manhã</option><option value="Tarde">Turno: Tarde</option></select>
            <input type="text" id="nomeFunc" placeholder="Nome do Funcionário">
            
            <div id="listaItens" style="margin-top:15px;"></div>
            
            <textarea id="obs" placeholder="Alguma avaria ou observação? (Opcional)"></textarea>
            
            <button id="btnEnviar" class="btn" onclick="enviarSobra()">FINALIZAR CONFERÊNCIA</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwymkSXlXjQj27nWokMK9nNSystwUnDXCUqV_b2QcfDRCswl_DhTDJ06ozslFf_FA1h/exec";
        
        async function init() {
            try {
                const res = await fetch(SCRIPT_URL + "?action=getProdutos");
                const produtos = await res.json();
                const container = document.getElementById('listaItens');
                
                if(produtos.length === 0) {
                    container.innerHTML = "<p>Nenhum produto cadastrado no ADM.</p>";
                } else {
                    produtos.forEach(item => {
                        container.innerHTML += `<div class="item-row"><span>${item}</span><input type="number" class="sobra-input" data-prod="${item}" placeholder="0"></div>`;
                    });
                }
                document.getElementById('loading').style.display = 'none';
                document.getElementById('formContent').style.display = 'block';
            } catch(e) { document.getElementById('loading').innerText = "Erro de conexão."; }
        }

        async function enviarSobra() {
            const nome = document.getElementById('nomeFunc').value;
            if(!nome) return alert("Por favor, digite seu nome.");
            
            const btn = document.getElementById('btnEnviar');
            btn.innerText = "ENVIANDO..."; btn.disabled = true;

            const itens = Array.from(document.querySelectorAll('.sobra-input'))
                .filter(i => i.value !== "").map(i => ({ produto: i.dataset.prod, qtd: parseInt(i.value) }));

            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    action: "sobra",
                    funcionario: nome,
                    turno: document.getElementById('turnoSelect').value,
                    observacao: document.getElementById('obs').value,
                    itens: itens
                })
            });
            alert("Dados enviados com sucesso!");
            location.reload();
        }
        init();
    </script>
</body>
</html>
