<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gullas - Loja</title>
    <style>
        :root { --primary: #f59e0b; }
        body { font-family: sans-serif; background: #f8fafc; text-align: center; padding: 15px; margin: 0; }
        .container { max-width: 400px; margin: auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        .logo { width: 150px; margin-bottom: 15px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .q-input { width: 70px; text-align: center; font-weight: bold; }
        .btn { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://raw.githubusercontent.com/juniorceara1983-stack/Gullas/main/1774954149094.png" class="logo">
        <input type="text" id="func" placeholder="Nome do Funcionário">
        <div id="lista"></div>
        <textarea id="obs" placeholder="Alguma observação?"></textarea>
        <button class="btn" id="btn" onclick="enviar()">ENVIAR CONFERÊNCIA</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwymkSXlXjQj27nWokMK9nNSystwUnDXCUqV_b2QcfDRCswl_DhTDJ06ozslFf_FA1h/exec";
        const fixos = ["Massa Quente", "Massa Fria", "Massa Forno", "Bolos (inteiros)", "Suco Galao", "Empadas", "Tortas", "Pastel"];

        async function init() {
            const res = await fetch(SCRIPT_URL);
            const rows = await res.json();
            const novos = rows.filter(r => r[1] === "ENVIO").map(r => r[2]);
            const listaTotal = [...new Set([...fixos, ...novos])];
            
            const cont = document.getElementById('lista');
            listaTotal.forEach(p => {
                cont.innerHTML += `<div class="item-row"><span>${p}</span><input type="number" class="q" data-p="${p}" placeholder="0"></div>`;
            });
        }

        async function enviar() {
            const n = document.getElementById('func').value;
            if(!n) return alert("Seu nome!");
            document.getElementById('btn').innerText = "Enviando...";
            const itens = Array.from(document.querySelectorAll('.q')).filter(i => i.value !== "").map(i => ({ produto: i.dataset.p, qtd: i.value }));
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "sobra", funcionario: n, itens: itens, observacao: document.getElementById('obs').value })});
            alert("Sucesso!"); location.reload();
        }
        init();
    </script>
</body>
</html>
