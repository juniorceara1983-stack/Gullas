<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gullas - Conferência de Loja</title>
    <style>
        :root { --primary: #f59e0b; --secondary: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 400px; margin: auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        .header { text-align: center; margin-bottom: 20px; }
        .logo-img { width: 120px; margin-bottom: 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .item-name { font-weight: 600; color: var(--secondary); }
        input[type="number"] { width: 70px; padding: 8px; border: 2px solid #cbd5e1; border-radius: 8px; text-align: center; font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 2px solid #cbd5e1; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://lh3.googleusercontent.com/d/1774954149094.png" alt="Gullas" class="logo-img">
            <h2 style="color: var(--secondary); margin: 0;">CONFERÊNCIA DE SOBRAS</h2>
        </div>

        <select id="turnoSelect">
            <option value="Manhã">Turno: Manhã (Fechamento 14h)</option>
            <option value="Tarde">Turno: Tarde (Fechamento Noite)</option>
        </select>
        
        <input type="text" id="nomeFunc" placeholder="Seu Nome">
        
        <div id="listaItens"></div>
        
        <button id="btnEnviar" class="btn" onclick="enviarSobra()">FINALIZAR CONFERÊNCIA</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzip6qASNtkcRNBWMINpQWVoxU71AL0Ajws_BmzobGdEBA23fa0-WvqX3GjIZf_me_1/exec";
        const itensAtivos = ["Massa Quente", "Massa Fria", "Massa Forno", "Bolos (inteiros)", "Suco Galao", "Empadas", "Tortas", "Pastel"];
        
        const container = document.getElementById('listaItens');
        itensAtivos.forEach(item => {
            container.innerHTML += `
                <div class="item-row">
                    <span class="item-name">${item}</span>
                    <input type="number" class="sobra-input" data-prod="${item}" placeholder="0">
                </div>`;
        });

        async function enviarSobra() {
            const nome = document.getElementById('nomeFunc').value;
            const turno = document.getElementById('turnoSelect').value;
            const btn = document.getElementById('btnEnviar');

            if(!nome) return alert("Digite seu nome!");

            btn.innerText = "ENVIANDO..."; btn.disabled = true;

            const inputs = document.querySelectorAll('.sobra-input');
            const itens = Array.from(inputs)
                .filter(i => i.value !== "")
                .map(i => ({ produto: i.dataset.prod, qtd: parseInt(i.value) }));

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "sobra", funcionario: nome, turno: turno, itens: itens })
                });
                alert("Sucesso! Sobras registradas.");
                location.reload();
            } catch (e) {
                alert("Erro ao enviar. Verifique a internet.");
                btn.disabled = false; btn.innerText = "FINALIZAR CONFERÊNCIA";
            }
        }
    </script>
</body>
</html>
